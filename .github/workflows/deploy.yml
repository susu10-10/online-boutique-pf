name: Deploy Boutique Container

on:
  workflow_run:
    workflows: [ "Terraform" ]
    types: [ completed ]
    branches: [ main ]
  workflow_dispatch:

env:
  TRIVY_VERSION: 0.72.0

jobs:
  security-scan:
    runs-on: ubuntu-22.04
    #if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v7
      - name: Run Trivy IaC scan on deploy config
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: deploy/
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table

      - name: Lint Docker Compose file
        run: |
          docker compose -f deploy/docker-compose.yml config
          echo "✅ Docker Compose file is valid"

      - name: Lint all Dockerfiles
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: src/*/Dockerfile
          failure-threshold: error

  deploy:
    needs: security-scan
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v7    
      - name: Get Droplet IP via DNS
        id: droplet-ip
        run: |
          echo "ip=$(dig +short suworks.me | head -1)" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ steps.droplet-ip.outputs.ip }}
          username: boutique
          key: ${{ secrets.SSH_PRIV_KEY }}
          script: |
            mkdir -p /opt/boutique/deploy
            echo "${{ secrets.BOUT_ENV_FILE }}" > /opt/boutique/deploy/.env
            chmod 600 /opt/boutique/deploy/.env 
            cd /opt/boutique/scripts/deploy

      - name: Copy compose and config files
        uses: appleboy/scp-action@v0.1.0
        with:
          host: ${{ steps.droplet-ip.outputs.ip }}
          username: boutique
          key: ${{ secrets.SSH_PRIV_KEY }}
          source: "deploy/*"
          target: "/opt/boutique/deploy/"

      - name: Deploy the application
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ steps.droplet-ip.outputs.ip }}
          username: boutique
          key: ${{ secrets.SSH_PRIV_KEY }}
          script: |
            cd /opt/boutique/deploy
            docker compose pull
            docker compose up -d --remove-orphans
            echo "==== Container Status ===="
            docker compose ps
            echo "Health Check Status"
            curl -so /dev/null -w 'Frontend: %{http_code}\n' http://localhost:8080/_healthz || echo "Health Check Failed"

