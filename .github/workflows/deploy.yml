name: Deploy Boutique Container

on:
  workflow_run:
    workflows: [ "Terraform" ]
    types: [ completed ]
    branches: [ main ]
  workflow_dispatch:

env:
  TRIVY_VERSION: 0.72.0
  DOCR: registry.digitalocean.com/idpreg

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}
      - name: Login to DOCR
        run: doctl registry login
      
      - name: Build and push all images
        run: |
          docker compose -f deploy/docker-compose.yml build
          docker compose -f deploy/docker-compose.yml push


  security-scan:
    needs: build-and-push
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Run Trivy IaC scan on deploy config
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: deploy/
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table

      - name: Lint Docker Compose file
        run: |
          docker compose -f deploy/docker-compose.yml config
          echo "✅ Docker Compose file is valid"

      - name: Lint all Dockerfiles
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: src/*/Dockerfile
          failure-threshold: error

  deploy:
    needs: security-scan
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7    
      - name: Get Droplet IP via DNS
        id: droplet-ip
        run: |
          echo "ip=$(dig +short suworks.me | head -1)" >> $GITHUB_OUTPUT

      - name: Prepare directories
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ steps.droplet-ip.outputs.ip }}
          username: boutique
          key: ${{ secrets.SSH_PRIV_KEY }}
          script: |
            sudo mkdir -p /opt/boutique
            sudo chown boutique:boutique /opt/boutique

      - name: Copy files
        uses: appleboy/scp-action@v0.1.0
        with:
          host: ${{ steps.droplet-ip.outputs.ip }}
          username: boutique
          key: ${{ secrets.SSH_PRIV_KEY }}
          source: "deploy/*"
          target: "/opt/boutique/"

      - name: Pull and start application
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ steps.droplet-ip.outputs.ip }}
          username: boutique
          key: ${{ secrets.SSH_PRIV_KEY }}
          script: |
            echo "${{ secrets.BOUT_ENV_FILE }}" | sudo tee /opt/boutique/deploy/.env
            sudo chmod 600 /opt/boutique/deploy/.env
            echo "${{ secrets.DO_TOKEN }}" | docker login registry.digitalocean.com -u "${{ secrets.DOCR_USERNAME }}" --password-stdin
            cd /opt/boutique/deploy
            docker compose pull
            docker compose up -d --remove-orphans
            echo "==== Container Status ===="
            docker compose ps
            echo "Health Check Status"
            curl -so /dev/null -w 'Frontend: %{http_code}\n' http://localhost:8080/_healthz || echo "Health Check Failed"

