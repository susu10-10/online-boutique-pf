name: Build and Push Boutique Containers

on:
  push:
    branches: [ main ]
    paths:
      - 'src/*'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  TRIVY_VERSION: 0.72.0
  DOCR: registry.digitalocean.com/idpreg

jobs:
  security-scan:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Run Trivy IaC scan on deploy config
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: deploy/
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table

      - name: Lint Docker Compose file
        run: |
          docker compose -f deploy/docker-compose.yml config
          echo "✅ Docker Compose file is valid"

      - name: Lint all Dockerfiles
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: src/*/Dockerfile
          failure-threshold: error

  build-and-push:
    needs: security-scan
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}
      - name: Login to DOCR
        run: doctl registry login
      - name: Build all images
        run: docker compose -f deploy/docker-compose.yml build

      - name: Scan built images with Trivy
        run: |
          docker pull aquasec/trivy:0.57.0 > /dev/null 2>&1
          
          # Get all built images matching your registry
           IMAGES=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "registry.digitalocean.com")
          
          IS_FIRST_RUN=true
          for img in $IMAGES; do
            echo "🔎 Scanning: $img"
            
            # Build database flags dynamically so it doesn't redownload for each image
            DB_FLAGS=""
            if [ "$IS_FIRST_RUN" = false ]; then
              DB_FLAGS="--skip-db-update"
            fi
            
            # Fixed: Put global flag '--skip-version-check' BEFORE the subcommand 'image'
            mkdir -p /tmp/trivy-cache
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v trivy-cache:/root/.cache \
              aquasec/trivy:0.57.0 --skip-version-check image \
              --severity HIGH,CRITICAL \
              --exit-code 0 \
              $DB_FLAGS \
              "$img"
              
            IS_FIRST_RUN=false
          done

      - name: Push all images
        run: docker compose -f deploy/docker-compose.yml push